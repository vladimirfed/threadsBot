name: Daily Threads Post

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then echo "::error::GEMINI_API_KEY is not set in repo Secrets"; exit 1; fi
          if [ -z "${{ secrets.THREADS_ACCESS_TOKEN }}" ]; then echo "::error::THREADS_ACCESS_TOKEN is not set in repo Secrets"; exit 1; fi
          if [ -z "${{ secrets.THREADS_USER_ID }}" ]; then echo "::error::THREADS_USER_ID is not set in repo Secrets"; exit 1; fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare data directory
        env:
          TEXT_STYLE_CONTENT: ${{ secrets.TEXT_STYLE_CONTENT }}
        run: |
          mkdir -p data
          if [ -n "$TEXT_STYLE_CONTENT" ]; then
            printf '%s' "$TEXT_STYLE_CONTENT" > data/textStyle.txt
          else
            cp data.example/textStyle.txt data/textStyle.txt
          fi

      - name: Random delay
        run: |
          DELAY=$((RANDOM % 3600))
          sleep $DELAY

      - name: Run bot once
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: node dist/index.js --once
